<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construcción & mantenimiento en Veracruz</title>
    <meta name="description" content="servicios profesionales de albañileria y mantenimiento">
    <meta name="author" content="José Vite">
    <meta property="og:title" content="Cosntrucción y mantenimiento en Veracruz">
    
    <meta property="og:description" content="Mejoramos tu hogar y tu negocio">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://graanhotdog-ops.github.io/lino-garcia/abraham.jpg">
    <meta property="og:url" content="https://graanhotdog-ops.github.io/lino-garcia/">
    
    <style>
        :root {
            --primary: #007AFF; /* Azul profesional */
            --dark: #1c1c1e;
            --light: #f5f5f7;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 40px 20px;
            text-align: center;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 { font-size: 1.5rem; margin: 15px 0 5px; }
        p { color: #666; margin-bottom: 30px; }

        .links-container {
            display: grid;
            gap: 15px;
        }

        .link-card {
            background: white;
            padding: 18px;
            border-radius: 15px;
            text-decoration: none;
            color: var(--dark);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .link-card:active { transform: scale(0.97); }
        
        .link-card:hover {
          transform: translateY(-3px);
          box-shadow: 0 10px 20px rgba(0,0,0,0.1);
          background-color: #ffffff;
          color: var(--primary);
        }


        .btn-main {
            background: var(--primary);
            color: white;
        }

        footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="abraham.jpg" alt="Abraham Vite" class="profile-img">
        <h1>Construcción & mantenimiento en Veracruz</h1>
        <p>Mejoramos tu hogar y tu negocio</p>
        
        
           
           
           <div class="links-container">
            <a href="https://wa.me/529381418085?text=Hola,%20me%20interesa%20una%20cotización" class="link-card btn-main" target="_blank" rel="noopener noreferrer">
                💬 Contáctame por WhatsApp
            </a>
            
        <section>
          <p>✔ Más de 5 años de experiencia</p>
          <p>✔ Trabajos en casas y negocios</p>
          <p>✔ Atención rápida por WhatsApp</p>
        </section>
        
       <a href="https://www.facebook.com/share/18bWnCWdY7/" class="link-card">
                📂 Ver Portafolio en Facebook (Proyectos)
           </a>
        

            <a href="https://www.instagram.com/lino.abra?igsh=MTUzcHVyNHV4ZHhh" class="link-card">
                📸 Sígueme en Instagram
            </a>
        </div>

        <footer>
            &copy; 2026 | Desarrollado por JV web.
        </footer>
    </div>

</body>
</html>
